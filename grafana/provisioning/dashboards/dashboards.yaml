apiVersion: 1

providers:
  - name: 5G-SMO-Dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Grafana will load all *.json files from this directory on startup
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
