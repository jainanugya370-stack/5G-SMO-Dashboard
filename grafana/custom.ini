[server]
protocol = http
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
allow_embedding = true
content_security_policy = false

[panels]
disable_sanitize_html = true

[auth.anonymous]
enabled = true
org_role = Viewer

[users]
allow_sign_up = false
default_theme = dark

[log]
level = warn

[dashboards]
versions_to_keep = 10