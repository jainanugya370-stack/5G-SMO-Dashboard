[server]
protocol = http
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
# Allow Grafana panels to be embedded inside iframes
allow_embedding = true
# Disable Content-Security-Policy so panels load in cross-origin iframes
content_security_policy = false
# Allow anonymous access to view dashboards (optional for internal use)
# Uncomment the three lines below if you want to disable the login screen:
# [auth.anonymous]
# enabled = true
# org_role = Viewer

[users]
allow_sign_up = false
default_theme = dark

[log]
level = warn

[dashboards]
# Allow auto-provisioned dashboards to be updated
versions_to_keep = 10
